<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Acciones</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:16px}
h1{font-size:20px;font-weight:600;margin-bottom:4px;color:#1a1a1a}
.subtitle{font-size:13px;color:#666;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.card{background:#fff;border-radius:10px;padding:10px 14px;border:1px solid #e8e8e4}
.card-label{font-size:11px;color:#888;margin-bottom:4px}
.card-val{font-size:22px;font-weight:600;color:#1a1a1a}
.card-sub{font-size:11px;color:#999;margin-top:2px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;background:#fff;padding:10px 12px;border-radius:10px;border:1px solid #e8e8e4}
.filters select{font-size:13px;padding:5px 8px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer}
.filters label{font-size:12px;color:#666;white-space:nowrap}
.slider-wrap{display:flex;align-items:center;gap:6px}
.slider-wrap input[type=range]{width:90px;accent-color:#185FA5}
.slider-val{font-size:12px;font-weight:600;color:#1a1a1a;min-width:40px}
.count-info{font-size:12px;color:#888;margin-bottom:6px}
.tbl-wrap{overflow-x:auto;border:1px solid #e8e8e4;border-radius:12px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
thead th{background:#f9f9f7;padding:8px 9px;text-align:left;font-weight:600;font-size:11px;color:#666;cursor:pointer;white-space:nowrap;user-select:none;border-bottom:1px solid #e8e8e4}
thead th:hover{color:#1a1a1a;background:#f0f0ea}
thead th.sort-asc::after{content:" ↑"}
thead th.sort-desc::after{content:" ↓"}
tbody tr{border-bottom:1px solid #f0f0ea}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
td{padding:7px 9px;white-space:nowrap;color:#1a1a1a;font-size:12px}
.ticker{font-weight:700;font-size:13px;color:#1a1a1a}
.name-cell{color:#666;font-size:11px;max-width:150px;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.up-pos{color:#27500A;font-weight:600}
.up-neg{color:#A32D2D;font-weight:600}
.up-mid{color:#7a4a00;font-weight:600}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle}
.na{color:#bbb}
footer{margin-top:16px;font-size:11px;color:#bbb;text-align:center}
</style>
</head>
<body>

<h1>📊 Dashboard de Acciones</h1>
<p class="subtitle">Actualizado desde Google Sheets · <span id="fecha"></span></p>

<div class="cards" id="summary-cards"></div>

<div class="filters">
  <select id="f-sector"><option value="">Todos los sectores</option></select>
  <select id="f-veredicto"><option value="">Todos los veredictos</option></select>
  <div class="slider-wrap">
    <label>Upside FZ mín:</label>
    <input type="range" id="f-upside" min="-100" max="60" step="1" value="-100">
    <span class="slider-val" id="upside-lbl">–</span>
  </div>
  <select id="f-recom"><option value="">Toda recomendación</option></select>
</div>

<div class="count-info" id="count-info"></div>

<div class="tbl-wrap">
  <table>
    <thead id="tbl-head"></thead>
    <tbody id="tbl-body"></tbody>
  </table>
</div>

<footer>Datos extraídos del sheet de análisis · Solo para uso informativo, no constituye asesoría financiera</footer>

<script>

const COLS=[
  {k:"ticker",label:"Ticker"},{k:"name",label:"Nombre"},{k:"sector",label:"Sector"},
  {k:"price",label:"Precio"},{k:"mcap",label:"Mkt Cap"},
  {k:"upside_fz",label:"Upside FZ"},{k:"upside_sa",label:"Upside SA"},{k:"ath_disc",label:"ATH Disc"},
  {k:"veredicto",label:"Veredicto"},{k:"piotroski",label:"Piotr."},{k:"altman",label:"Altman Z"},
  {k:"rsi",label:"RSI"},{k:"recom_rsi",label:"RSI Rec"},{k:"recom_fz",label:"Rec FZ"},{k:"recom_sa",label:"Rec SA"}
];

const SC={"Technology":["#E8F4FD","#0C447C"],"Communication Services":["#EEF0FD","#3C3489"],"Financial":["#E8F7F0","#085041"],"Consumer Cyclical":["#FEF4E0","#7a4a00"],"Consumer Defensive":["#EFF8E0","#27500A"],"Healthcare":["#FDEEE8","#712B13"],"Utilities":["#F5F5F0","#444441"],"Energy":["#FDE8F0","#72243E"],"Industrials":["#FEF8E0","#5a3e0a"],"Basic Materials":["#E8F5FF","#0a4a6e"]};
const VC={"OPORTUNIDAD":["#EFF8E0","#27500A"],"Buena":["#E8F7F0","#085041"],"Neutral":["#F5F5F0","#5F5E5A"],"Evitar":["#FDEAEA","#791F1F"]};
const RC={"Compra":["#EFF8E0","#27500A"],"Neutral":["#F5F5F0","#5F5E5A"],"Venta":["#FEF4E0","#7a4a00"],"Venta Fuerte":["#FDEAEA","#791F1F"]};

function badge(t,c){if(!t||t==="null")return`<span class="na">–</span>`;return`<span class="badge" style="background:${c[0]};color:${c[1]}">${t}</span>`;}
function pct(v,cls){if(v===null)return`<span class="na">–</span>`;return`<span class="${cls}">${v>0?"+":""}${v.toFixed(1)}%</span>`;}
function piotr(v){if(v===null)return`<span class="na">–</span>`;const c=v>=7?"#3B6D11":v>=5?"#185FA5":v>=3?"#BA7517":"#A32D2D";return`<span class="dot" style="background:${c}"></span><b>${v}</b>`;}
function fmtP(v){return v>=1000?v.toFixed(0)+"$":v.toFixed(2)+"$";}
function fmtM(v){return v>=1000?(v/1000).toFixed(1)+"T":v.toFixed(0)+"B";}

let sortCol="upside_fz",sortDir=-1;

function toObj(r){return{ticker:r[0],name:r[1],sector:r[2],price:r[3],mcap:r[4],upside_fz:r[5],upside_sa:r[6],ath_disc:r[7],veredicto:r[8],piotroski:r[9],altman:r[10],rsi:r[11],recom_rsi:r[12],recom_fz:r[13],recom_sa:r[14]};}

function getData(){
  const sec=document.getElementById("f-sector").value;
  const ver=document.getElementById("f-veredicto").value;
  const ups=parseFloat(document.getElementById("f-upside").value);
  const rec=document.getElementById("f-recom").value;
  return RAW.filter(r=>(!sec||r[2]===sec)&&(!ver||r[8]===ver)&&(r[5]===null||r[5]>=ups)&&(!rec||r[12]===rec)).map(toObj);
}

function sortData(d){
  return[...d].sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(av===null&&bv===null)return 0;if(av===null)return 1;if(bv===null)return-1;
    if(typeof av==="string")return av.localeCompare(bv)*sortDir;
    return(av-bv)*sortDir;
  });
}

function renderSummary(data){
  const opps=data.filter(d=>d.veredicto==="OPORTUNIDAD").length;
  const buenas=data.filter(d=>d.veredicto==="Buena").length;
  const upFZ=data.filter(d=>d.upside_fz!==null).map(d=>d.upside_fz);
  const avgUp=upFZ.length?upFZ.reduce((a,b)=>a+b,0)/upFZ.length:0;
  const pios=data.filter(d=>d.piotroski!==null).map(d=>d.piotroski);
  const avgPio=pios.length?pios.reduce((a,b)=>a+b,0)/pios.length:0;
  const compras=data.filter(d=>d.recom_rsi==="Compra"||d.recom_rsi==="Compra Fuerte").length;
  document.getElementById("summary-cards").innerHTML=`
    <div class="card"><div class="card-label">Total tickers</div><div class="card-val">${data.length}</div></div>
    <div class="card"><div class="card-label">Oportunidades</div><div class="card-val" style="color:#27500A">${opps}</div><div class="card-sub">${buenas} buenas</div></div>
    <div class="card"><div class="card-label">Upside FZ promedio</div><div class="card-val" style="color:${avgUp>=0?"#27500A":"#A32D2D"}">${avgUp>=0?"+":""}${avgUp.toFixed(1)}%</div></div>
    <div class="card"><div class="card-label">Piotroski prom.</div><div class="card-val">${avgPio.toFixed(1)}</div><div class="card-sub">/9 pts</div></div>
    <div class="card"><div class="card-label">Señales compra RSI</div><div class="card-val" style="color:#185FA5">${compras}</div></div>`;
}

function renderHead(){
  document.getElementById("tbl-head").innerHTML=`<tr>${COLS.map(c=>{
    let cls=c.k===sortCol?(sortDir===1?"sort-asc":"sort-desc"):"";
    return`<th class="${cls}" data-col="${c.k}">${c.label}</th>`;
  }).join("")}</tr>`;
  document.querySelectorAll("thead th").forEach(th=>th.addEventListener("click",()=>{
    const col=th.dataset.col;
    if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}
    render();
  }));
}

function renderBody(data){
  const sorted=sortData(data);
  document.getElementById("count-info").textContent=`Mostrando ${sorted.length} de ${RAW.length} tickers`;
  document.getElementById("tbl-body").innerHTML=sorted.map(d=>{
    const sc=SC[d.sector]||["#F5F5F0","#444441"];
    const vc=VC[d.veredicto]||["#F5F5F0","#444441"];
    const rc=RC[d.recom_rsi]||["#F5F5F0","#5F5E5A"];
    const fzColor=d.recom_fz<=1.5?"#27500A":d.recom_fz<=2?"#185FA5":d.recom_fz<=3?"#5F5E5A":"#A32D2D";
    const rsiColor=d.rsi>70?"#A32D2D":d.rsi<30?"#27500A":"#1a1a1a";
    return`<tr>
      <td><span class="ticker">${d.ticker}</span></td>
      <td><span class="name-cell" title="${d.name}">${d.name}</span></td>
      <td>${badge(d.sector,sc)}</td>
      <td>${fmtP(d.price)}</td>
      <td>${fmtM(d.mcap)}</td>
      <td>${pct(d.upside_fz,d.upside_fz>=30?"up-pos":d.upside_fz>=10?"up-mid":"up-neg")}</td>
      <td>${pct(d.upside_sa,d.upside_sa!==null&&d.upside_sa>=30?"up-pos":d.upside_sa!==null&&d.upside_sa>=10?"up-mid":"up-neg")}</td>
      <td>${pct(d.ath_disc,d.ath_disc>=0?"up-pos":"up-neg")}</td>
      <td>${badge(d.veredicto,vc)}</td>
      <td>${piotr(d.piotroski)}</td>
      <td>${d.altman!==null?d.altman.toFixed(2):'<span class="na">–</span>'}</td>
      <td style="font-weight:600;color:${rsiColor}">${d.rsi!==null?d.rsi.toFixed(1):'<span class="na">–</span>'}</td>
      <td>${badge(d.recom_rsi,rc)}</td>
      <td style="font-weight:600;color:${fzColor}">${d.recom_fz!==null?d.recom_fz.toFixed(2):'<span class="na">–</span>'}</td>
      <td style="font-weight:600">${d.recom_sa!==null?d.recom_sa:'<span class="na">–</span>'}</td>
    </tr>`;
  }).join("");
}

function populateFilters(){
  const sectors=[...new Set(RAW.map(r=>r[2]))].sort();
  const vOrder=["OPORTUNIDAD","Buena","Neutral","Evitar"];
  const rOrder=["Compra","Compra Fuerte","Neutral","Venta","Venta Fuerte"];
  const recoms=[...new Set(RAW.map(r=>r[12]).filter(Boolean))];
  const sf=document.getElementById("f-sector");
  sectors.forEach(s=>sf.innerHTML+=`<option value="${s}">${s}</option>`);
  const vf=document.getElementById("f-veredicto");
  vOrder.forEach(v=>vf.innerHTML+=`<option value="${v}">${v}</option>`);
  const rf=document.getElementById("f-recom");
  rOrder.filter(r=>recoms.includes(r)).forEach(r=>rf.innerHTML+=`<option value="${r}">${r}</option>`);
}

function render(){
  const data=getData();
  renderSummary(data);renderHead();renderBody(data);
}

function init(){
  populateFilters();
  const slider=document.getElementById("f-upside");
  const lbl=document.getElementById("upside-lbl");
  slider.addEventListener("input",()=>{lbl.textContent=slider.value+"%";render();});
  lbl.textContent=slider.value+"%";
  ["f-sector","f-veredicto","f-recom"].forEach(id=>document.getElementById(id).addEventListener("change",render));
  render();
}
init();
</script>
</body>
</html>
